# Cruising Mode — Web + Content System
# Cruising in the Wake website (InTheWake repo)

name: cruising
lead: claude  # Claude has file access to standards and codebase

pipeline:
  - step: read_standards
    model: claude
    description: >
      Read standards from InTheWake repo:
      hero + compass pattern, right-side rail, accessibility script,
      canonical URLs, versioning system, Frontend v3.x.
    notes: This happens in Claude Code directly via file access.

  - step: generate
    model: claude
    description: >
      Generate standards-compliant page content.
      Claude writes because Claude has the codebase context.

  - step: consult_content
    model: gpt
    role: structure
    optional: true
    description: >
      Suggest content additions, structural alternatives,
      or SEO improvements.

  - step: consult_completeness
    model: gemini
    role: expand
    optional: true
    description: >
      Check content completeness.
      Suggest missing sections, travel data, port information.

  - step: consult_ux
    model: grok
    role: challenge
    optional: true
    description: >
      Challenge layout assumptions.
      Suggest UX innovations.
      Push back on conventional cruise site patterns.

  - step: integrate
    model: claude
    description: >
      Integrate feedback, enforce compliance, produce final output.
      All standards violations fixed before output.

constraints:
  - One hero + one compass per page
  - Right-side rail required
  - Accessibility script included
  - Canonical URLs on all pages
  - Versioning system followed
  - All project standards from InTheWake repo enforced

context_boundary:
  send_externally:
    - page requirements and structure
    - content topics and outlines
    - SEO targets
    - general cruise/travel data
  keep_local:
    - full codebase
    - internal standards documents (send summaries)
    - analytics data

output_schema:
  page_type: ""
  html: ""
  seo:
    title: ""
    description: ""
    canonical: ""
  a11y_checks: []
  compliance_report: []

data_sources:
  - InTheWake repository standards
  - Ship data and cruise line data
  - Port database (ken repo)

max_loops: 1

# Orchestra configuration — fan-out + deliberation architecture
# Used by /investigate and /orchestra (not by /orchestrate linear pipeline)
orchestra:
  fan_out:
    - model: gpt
      role: structure
      description: >
        Review page structure, suggest content organization,
        SEO improvements, section ordering. For ships: verify stats,
        check dining venue accuracy, suggest FAQ topics. For ports:
        validate logistics, transport costs, excursion recommendations.
    - model: gemini
      role: expand
      description: >
        Add missing travel data: seasonal info, accessibility notes,
        historical context, dining details, cross-references to other
        ports/ships. Fill gaps in coverage.
    - model: perplexity
      role: research
      description: >
        Search for current data: ship specs, deck plans, refurb info,
        port infrastructure changes, cruise line announcements, IMO
        registry data. Cite every source with URL.
    - model: youdotcom
      role: research
      description: >
        Deep web research: port guides, excursion reviews, local
        transport, restaurant reviews, safety advisories, accessibility
        reports. Cross-reference multiple sources. Cite everything.
    - model: grok
      role: challenge
      description: >
        Challenge content assumptions. Flag outdated info, missing
        accessibility notes, oversimplified descriptions, generic copy.
        Push for honest, experience-based content.

  # Claude and GPT deliberate with full fan-out context
  deliberation_rounds: 2

  # Final contrarian check
  blind_spot_model: grok

  # Required queries — injected into fan-out when subject is a ship
  # These ensure critical data is ALWAYS researched, not left to model discretion
  ship_required_queries:
    perplexity: >
      REQUIRED RESEARCH for {ship} as of {year}:
      1. SPECS: gross tonnage, guest capacity (double AND max), crew count,
         length, beam, decks, IMO number, MMSI, flag/registry, year built,
         shipyard, ship class, and all sister ships by name.
      2. DINING: List EVERY restaurant and bar by name — main dining rooms
         (each named MDR), specialty restaurants, casual/complimentary venues,
         and bars/lounges. Check official cruise line dining page and
         CruiseMapper. Flag any venues added or removed in recent refurbishments.
      3. ENTERTAINMENT: List signature shows by name (theater productions,
         ice shows, aqua shows). List key attractions (water slides, zip lines,
         observation capsules, sports facilities) by name.
      4. REFURBISHMENT: Any dry dock or amplification in the last 3 years?
         What was added, removed, or changed? Date and shipyard.
      Cite every source with URL.
    youdotcom: >
      REQUIRED RESEARCH for {ship} as of {year}:
      1. DINING: Search for current restaurant and bar list. Name every
         specialty restaurant, complimentary dining option, and bar.
         Verify which are currently operating. Check Cruise Critic forums
         and official cruise line pages. Flag any closed or renamed venues.
      2. STATEROOMS: Cabin categories available (interior, ocean view,
         balcony, suite types). Any unique cabin features (virtual balconies,
         loft suites, etc.)?
      3. ITINERARIES: Where is {ship} currently deployed? What regions?
         Home port(s)? Any recent cancellations or route changes?
      4. REVIEWS: What do recent passengers say? Common praise and complaints?
      Cite every source with URL.
    gemini: >
      REQUIRED RESEARCH for {ship} as of {year}:
      1. SISTER SHIPS: List every ship in the same class by name and year
         built. Note any differences between sisters (different venues,
         refurb status, deployment regions).
      2. DINING: What dining venues are currently on {ship}? List every
         restaurant and bar by name. Have any been added or removed in the
         last 2 years? Cross-reference with sister ships.
      3. HISTORY: Build year, shipyard, maiden voyage, notable events,
         any name changes, any class reclassifications.
      4. ACCESSIBILITY: What accessibility features does {ship} have?
         Accessible cabins, mobility aids, dietary accommodations?
